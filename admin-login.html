<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المدير - مركز قنديل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Tajawal', 'Cairo', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0F172A 0%, #0EA5B7 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
    </style>
</head>
<body>
    <div class="bg-white rounded-3xl p-8 shadow-2xl max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-[#0EA5B7] to-[#06B6D4] flex items-center justify-center mx-auto mb-4">
                <span class="text-5xl">🦷</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">تسجيل دخول المدير</h1>
            <p class="text-gray-500 mt-2">مركز قنديل لطب وتجميل Teeth</p>
        </div>
        
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">اسم المستخدم</label>
                <input type="text" id="username" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#0EA5B7] focus:ring-2 focus:ring-[#0EA5B7]/20 transition text-lg" placeholder="أدخل اسم المستخدم">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">كلمة المرور</label>
                <input type="password" id="password" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#0EA5B7] focus:ring-2 focus:ring-[#0EA5B7]/20 transition text-lg" placeholder="••••••••">
            </div>
            <p id="error-msg" class="text-red-500 text-sm text-center hidden"></p>
            <button type="submit" class="w-full bg-gradient-to-r from-[#0EA5B7] to-[#06B6D4] text-white py-4 rounded-xl font-bold text-lg hover:opacity-90 transition shadow-lg">
                تسجيل الدخول 🔐
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-gray-500 hover:text-[#0EA5B7] text-sm">← العودة للرئيسية</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        const savedSession = localStorage.getItem('kandil_admin_session');
        if (savedSession) {
            const session = JSON.parse(savedSession);
            if (session.loggedIn && session.loginTime) {
                const dayAgo = Date.now() - (24 * 60 * 60 * 1000);
                if (session.loginTime > dayAgo) {
                    window.location.href = 'admin.html';
                    throw '';
                }
            }
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            // Simple hash for demo
            const inputHash = btoa(password).slice(0, 12);
            
            if (username === 'admin' && inputHash === '6d5e4f3c2b1a0') {
                const adminSession = { 
                    username: 'admin', 
                    role: 'admin', 
                    loggedIn: true, 
                    loginTime: Date.now() 
                };
                localStorage.setItem('kandil_admin_session', JSON.stringify(adminSession));
                window.location.href = 'admin.html';
            } else {
                errorMsg.textContent = '⚠️ اسم المستخدم أو كلمة المرور غير صحيحة';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
